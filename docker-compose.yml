services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-pro-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_agent}
      POSTGRES_DB: ${POSTGRES_DB:-ai_pro_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_agent} -d ${POSTGRES_DB:-ai_pro_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-pro-agent:
    image: registry.gitlab.dipeak.com/dipeak/generic-repository/ask-bi-node:20260526-220842-ai-pro-agent
    container_name: ai-pro-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CLIENT_DIST_DIR: /app/public
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL:-postgresql://ai_agent:ai_agent@postgres:5432/ai_pro_agent}
    ports:
      - "3903:3003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data: