services:
  ai-pro-agent:
    image: registry.gitlab.dipeak.com/dipeak/generic-repository/ask-bi-node:20260523-101150
    container_name: ai-pro-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CLIENT_DIST_DIR: /app/public
      PORT: 3003
    ports:
      - "3903:3003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s